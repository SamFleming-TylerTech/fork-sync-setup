name: Security Scan

on:
  workflow_run:
    workflows: ["Sync Upstream"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  statuses: write
  checks: write
  security-events: write

concurrency:
  group: security-scan
  cancel-in-progress: false

jobs:
  scan:
    if: github.event.workflow_run.conclusion == 'success'
    uses: __TEMPLATES_REPO__/.github/workflows/security-scan.yml@__TEMPLATES_REF__
    with:
      default_branch: __DEFAULT_BRANCH__
    secrets: inherit
