# ==============================================================================
# Workflow Migration Example: Switching to Forked GitHub Actions
# ==============================================================================
#
# This file demonstrates the changes needed in your CI/CD workflows to reference
# forked actions in your organization instead of third-party upstreams.
#
# WHY: Referencing forks protects against supply chain attacks where upstream
# maintainers could mutate tags, get compromised, or inject malicious code.
#
# ==============================================================================

# ------------------------------------------------------------------------------
# BEFORE: Direct upstream references (INSECURE)
# ------------------------------------------------------------------------------
# These reference third-party repos directly. A tag like v2.0.0 could be
# force-pushed to point at malicious code at any time.
#
#   - name: Deploy
#     uses: acme/deploy-action@v2.0.0
#
#   - name: Post Comment
#     uses: acme/pr-comment-action@v1
#
#   - name: Publish Results
#     uses: acme/test-results-action@v3.1.0

# ------------------------------------------------------------------------------
# AFTER: Forked references (SECURE)
# ------------------------------------------------------------------------------
# These reference your organizational forks. Tags are reviewed and created by
# your team after security review. FORK_MANIFEST.json tracks provenance.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ... build steps ...

      - name: Deploy
        uses: my-org/deploy-action@v2.0.0

      - name: Post Comment
        uses: my-org/pr-comment-action@v1

      - name: Publish Results
        uses: my-org/test-results-action@v3.1.0

# ------------------------------------------------------------------------------
# MAXIMUM SECURITY: Pin to full commit SHA (optional)
# ------------------------------------------------------------------------------
# For the highest level of supply chain security, pin to the exact commit SHA
# from the fork. This is immune to tag mutation.
#
#   - name: Deploy
#     uses: my-org/deploy-action@a1b2c3d4e5f6...
#
# The SHA can be found in FORK_MANIFEST.json under pinned_tags[].fork_sha

# ------------------------------------------------------------------------------
# ACTIONS THAT DO NOT NEED FORKING
# ------------------------------------------------------------------------------
# These are maintained by GitHub (corporate-backed) or your own organization:
#
#   actions/checkout@v4           # Official GitHub action
#   actions/setup-dotnet@v4       # Official GitHub action
#   actions/upload-artifact@v4    # Official GitHub action
#   my-org/*                      # Internal org actions
